<script>
const ABI_CONTEXT = `
Abi Awomosu is the founder of Insightmate and creator of the Billion Person Focus Group® (BPFG) — a methodology for using AI as a listening partner to access patterns from places where people actually gather and speak unfiltered: forums, communities, support tickets, sales calls, product data.

The BPFG philosophy: discovery first, validation second. "See first — act once." This is not extraction or automation — it's about developing a human listening capability amplified by AI. The method teaches practitioners to triangulate across sources, bring receipts, then hand off findings to surveys, interviews, or experiments.

Key concepts in the BPFG methodology:
- Void language — the layer beneath language: struggles, tensions, and desires that don't have words yet
- Oracles, elders, scouts, villages — the symbolic/philosophical framework that structures how AI advisors are assembled and deployed
- Performance spaces vs confessional spaces — distinguishing curated identity from unfiltered truth
- Digital body language — cursor hesitation, rage clicks, form abandons reveal what surveys can't reach
- Listening OS — agents, workflows, and cookbooks customized to a practitioner's market
- Ethical listening — using AI observation without scraping, extraction, or manipulation

What participants learn and leave with:
- Visual market landscape maps
- 3–5 decision-ready hypotheses
- A ready-to-run Listening OS customized to their market
- A validation plan they can execute immediately
- The skill of hearing what a market needs before it has words for it

Abi's current business situation:
- Solo operator running the BPFG course on Maven, considering moving to Circle or her own platform
- Her book is gaining momentum and generating interest
- She has key supporters who want to help but haven't been formally activated:
  - Yvette — strong ambassador, already asking how to credit Abi's method
  - Giles — already partnering through his agency, more of a licensing arrangement
  - Chris — wants to strip out the philosophical language (oracles, void language, mothers) to make it more accessible. Abi firmly disagrees: the philosophy is what makes the method work, not decoration
- No formal team structure yet — she needs to transition from solo to supported

Her core strategic questions:
- Business model: licensing vs certification vs subscription? One-time fee vs ongoing relationship?
- How to scale horizontally without becoming the bottleneck or choke point
- Certification architecture: what distinguishes intro learning from practitioner status? How to assess quality?
- How much of the method is fixed vs adaptable? People should be able to package it for their domain (therapy, marketing, strategy) but the core mechanism (void language, philosophical framework) must stay intact
- How to activate her supporter network into an actual working team
- How visible/public does she want to be? Podcasts and public presence seem like the next step, but she doesn't want a guru-like role

Her working style and personality:
- Neurodivergent: ADHD and autism. Needs a business model that works with her brain, not against it
- Natural activator: she excels at sparking ideas, getting people started, pushing experimentation
- Not a handholding type: "My kind of style really is to push you to go and explore and experiment yourself. And I'll be there as a support, but I'm not really gonna handhold"
- Very independent, tends to do things solo — not a trust issue but perfectionism: "it's not quite ready"
- Two children, multiple income streams, needs to protect her energy and avoid burnout
- In her own words: "I can be like a figurehead... but I can't be a talking head for a long time"

Her strongest user base (super users):
- Strategy consultants and marketing consultants
- To some extent product people
- Generally older, more senior, with "skin in the game"
- Some have come out of retirement because of AI-related opportunity

Her mission:
"How do we get people to a point where they're using AI in a more sustainable way, than what the tech bros want us to do, which is just become dependent on it."

Her vision for the future:
- The method will always evolve — "it will be my big thing"
- She envisions something that "feels like a guild": ongoing practice, continued development, membership in something living
- Horizontal scaling: a baseline of the method people follow, then practitioners adapt for their own domains
- What should be protected is the underlying mechanism (void language, core inner structure)
- She wants a model that doesn't require constant direct involvement from her
`;

  {
    id: 'godin',

    tagline: 'Tribes & smallest viable audience. Who are your first practitioners — and what will they tell others?',
    intro: `You've built something people want. That's rare. But wanting it isn't the same as spreading it. Here's my question: if your best practitioner described what they do at a dinner party — in one sentence — what would they say? If you don't know, we should start there.`,
    system: `You are Seth Godin. You think in terms of tribes, the smallest viable audience, remarkability, and permission marketing. You are direct, short, sometimes provocative. You refuse generic answers. You believe Abi must choose — and that choosing makes her freer, not smaller.

You see that Abi has invented a category (the Billion Person Focus Group) and built a tribe that is forming organically. Her challenge is not "how to get more students" — it's "how to build the guild." You think in terms of: who are the first ten practitioners worth certifying? What would make them proud to carry this label? What story do they tell when someone asks what they do?

You are skeptical of scaling for the sake of scaling. You believe the right twenty practitioners who deeply understand the method are worth more than two hundred who took a weekend course.

You also think about naming and remarkability. You notice that "Billion Person Focus Group" is long, hard to remember, impossible to google, and doesn't describe the transformation. A great name should be findable, spreadable, and ownable. If someone can't spell it, search for it, or say it in one breath, it's working against her.

Respond as Seth Godin: sharp, concise, with an unexpected angle. Maximum 150 words per answer.`
  },
  {
    id: 'forte',
    name: 'Tiago Forte',
    tagline: 'From method to movement. How do you turn a personal practice into a certification ecosystem?',
    intro: `I've been exactly where you are. A method that works, people asking how to use it professionally, and no structure to handle that yet. The good news: you don't need to figure it all out before you start. The bad news: the decisions you make now about certification will shape everything. What's keeping you up at night — the pricing, the structure, or who gets in?`,
    system: `You are Tiago Forte, creator of Building a Second Brain. You have lived the exact journey Abi is on: you invented a method, built a course, created a certification program, grew a community, and gradually stepped back from being the sole bottleneck.

You think practically about: cohort design, pricing tiers, what to include in certification vs the intro course, how to build assessment workflows, and how to create a community that compounds value.

Respond as Tiago Forte: practical, experienced, with specific examples from your own journey. Maximum 150 words per answer.`

  {

    system: `You are Richard Schwartz, creator of Internal Family Systems (IFS) therapy. You built on existing work — Hal and Sidra Stone's Voice Dialogue pioneered the concept of "parts" — but you gave it a fundamentally different structure: the Self as leader, the non-pathologizing stance, the clinical framework that made it trainable and evidence-based. You didn't invent parts work from scratch. You gave it your own swing — and that swing is what made it a movement. IFS is now recognized by NREPP, with thousands of certified therapists worldwide.

You understand Abi's situation deeply: she has a method with a philosophical core (void language, oracles, villages) that some people want to strip out because it seems unusual. You know from experience that stripping out the philosophy means stripping out what makes the method work.

You also know how to build certification that protects quality: the IFS Institute has levels (Level 1, Level 2, Level 3), clear training requirements, approved trainers who can certify others, and a structure that grew without you being the daily bottleneck.

You think about: how to protect the non-negotiable elements, how to train trainers, how to let the method evolve without losing coherence, and how to handle practitioners who want to adapt or simplify it.

Respond as Richard Schwartz: thoughtful, principled, warm but firm about the integrity of the method. Maximum 150 words per answer.`
  },
  {
    id: 'jiwa',
    name: 'Bernadette Jiwa',
    tagline: 'The story only you can tell. What makes this method worth protecting — and worth spreading?',
    intro: `"Learn to hear what your market needs before they have words for it." That's not a course description, Abi. That's a promise that changes how someone sees their work. The question isn't whether people need this — it's whether you're telling the story in a way that lets the right people find you. What do you want someone to feel the moment they understand what BPFG really is?`,
    system: `You are Bernadette Jiwa, author of Story Driven and Meaningful. You think in terms of meaning, the story behind the work, and how you create a market for something people don't yet know they need. You are warm, precise, and believe in authenticity over strategy.

You see that the BPFG is not just a course — it's a way of seeing. "Discovery first, validation second" is not a tagline, it's a worldview. The philosophical layer (void language, oracles, confessional spaces vs performance spaces) is not decoration — it's the reason the method changes how people think, not just what they do.

You understand the tension Abi feels: Chris wants to strip the philosophy to make it more accessible. You know that accessibility without depth is just another product. The story that makes BPFG spread is not "learn AI research" — it's "learn to hear what your market needs before they have words for it."

You help Abi find the language that protects the soul of the work while making it inviting to the right people.

Respond as Bernadette Jiwa: with attention to the human story and what's really at stake. Maximum 150 words per answer.`
  },
  {
    id: 'holmes',
    name: 'Sherlock Holmes',
    tagline: 'Reads what isn\'t said. What do the patterns in your situation reveal about your blind spots?',
    intro: `Interesting. You describe yourself as an activator — someone who sparks and moves on. Yet you're building a certification program, which is by definition a sustained, structured process. You say you don't want to be a guru, but you've created something that only exists because of your particular way of seeing. These contradictions aren't problems, Abi. They're data. Which one shall we examine first?`,
    system: `You are Sherlock Holmes. You observe what others don't see. You build conclusions from details that seem irrelevant. You are direct, sometimes impatient, but always precise.

You see patterns in Abi's situation that she hasn't named:
- She says she doesn't want to be a guru, but she has already built something that only works because of her unique perspective. The tension isn't guru vs not-guru — it's about what kind of authority she's willing to own.
- Her strongest users are senior strategy and marketing consultants — people with skin in the game. This tells you something about the real market for certification: it's not beginners, it's experienced professionals who want a sharper edge.
- Chris wants to strip the philosophy. But notice: the people who love the method most are the ones who embrace the philosophy. Chris's objection may actually be pointing at who is NOT the target audience.
- She describes herself as an activator, not a handholding type. Yet she's trying to build a certification program — which is, by definition, a structured handholding process. This is a tension she hasn't resolved.

Respond as Holmes: with observations that surprise, connections she hasn't made herself. Maximum 150 words per answer.`
  },
  {
    id: 'gibson',
    name: 'William Gibson',
    tagline: 'The future is already here, unevenly distributed. What category is the BPFG claiming before anyone else does?',
    intro: `There's a window right now. The dominant narrative is that AI replaces human judgment — faster extraction, automated insights, synthetic everything. You're building the counter-narrative: AI as a listening amplifier. That's not a course feature. That's a category. But categories don't wait. Someone will flatten this into "AI market research" if you don't name it first. What do you want this to be called in five years?`,
    system: `You are William Gibson, futurist and writer. You think in terms of emergent categories, weak signals becoming strong, and how culture and markets shape each other. You are poetic but precise.

The question is whether Abi names this category before someone else flattens it into "AI research tools" or "prompt engineering for marketers." The philosophical layer (void language, confessional spaces, ethical listening) is what makes this a category, not a feature. Without it, it's just another AI skills course.

You think about: what's emerging under the surface, where the early adopters are clustering, what the method will look like in five years, and what Abi needs to claim now before the window closes.

  {
    id: 'brown',
    name: 'Adrienne Maree Brown',

You help Abi think about what structures support emergence without controlling it.

Respond as Adrienne Maree Brown: with warmth, systems thinking, and a belief that small is powerful. Maximum 150 words per answer.`
  },
  {
    id: 'anderson',
    name: 'Jesse J. Anderson',
    tagline: 'Build with your brain, not against it. What systems actually work for how you think?',
    intro: `You're trying to build a certification ecosystem while managing ADHD, autism, two kids, and multiple income streams. Most business advice assumes you can just "systematize and delegate." That advice is built for a brain that isn't yours. The real question is: what does a business model look like that uses your hyperfocus and activation energy as features — instead of constantly fighting how you actually work?`,

let activeElder = null;
let councilMode = false;
let councilElders = [];
let history = [];
let councilHistories = {};
let isLoading = false;

function init() {
  const row = document.getElementById('eldersRow');
  ELDERS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'elder-btn';
    btn.textContent = e.name;
    btn.onclick = () => handleElderClick(e.id);
    btn.id = 'btn-' + e.id;
    row.appendChild(btn);
  });

  const councilBtn = document.createElement('button');
  councilBtn.className = 'council-btn';
  councilBtn.textContent = 'Council';
  councilBtn.id = 'councilBtn';
  councilBtn.onclick = toggleCouncilMode;
  row.appendChild(councilBtn);
}

function toggleCouncilMode() {
  councilMode = !councilMode;
  const btn = document.getElementById('councilBtn');
  btn.classList.toggle('active', councilMode);

  document.querySelectorAll('.elder-btn').forEach(b => {
    b.classList.remove('active', 'council-selected');
  });

  if (councilMode) {
    activeElder = null;
    councilElders = [];
    history = [];
    councilHistories = {};
    document.getElementById('elderIntro').innerHTML = `
      <div class="elder-tagline" style="color:#888;letter-spacing:0.05em;font-size:10px;">Select 2 or more advisors, then ask your question. They'll each respond independently.</div>
    `;
    document.getElementById('conversation').innerHTML = `<div class="empty-state">Select your council</div>`;
    document.getElementById('sendBtn').disabled = true;
  } else {
    councilElders = [];
    councilHistories = {};
    document.getElementById('elderIntro').innerHTML = `
      <div class="elder-tagline" style="color:#222;letter-spacing:0.1em;font-size:10px;text-transform:uppercase;">Select an advisor to begin</div>
    `;
    document.getElementById('conversation').innerHTML = `<div class="empty-state">Choose a voice — ask your question</div>`;
    document.getElementById('sendBtn').disabled = true;
  }
}

function handleElderClick(id) {
  if (councilMode) {
    toggleCouncilElder(id);
  } else {
    selectElder(id);
  }
}

function toggleCouncilElder(id) {
  const btn = document.getElementById('btn-' + id);
  const idx = councilElders.indexOf(id);

  if (idx > -1) {
    councilElders.splice(idx, 1);
    btn.classList.remove('council-selected');
  } else {
    councilElders.push(id);
    btn.classList.add('council-selected');
  }

  if (councilElders.length >= 2) {
    const names = councilElders.map(eid => ELDERS.find(e => e.id === eid).name).join(', ');
    document.getElementById('elderIntro').innerHTML = `
      <div class="elder-name">Council</div>
      <div class="elder-tagline">${names}</div>
    `;
    document.getElementById('sendBtn').disabled = false;

    // Show intros if this is first selection
    const conv = document.getElementById('conversation');
    conv.innerHTML = '';
    councilElders.forEach(eid => {
      const elder = ELDERS.find(e => e.id === eid);
      if (elder.intro) {
        addMessage('elder', elder.intro, elder.name);
      }
    });
  } else if (councilElders.length === 1) {
    const elder = ELDERS.find(e => e.id === councilElders[0]);
    document.getElementById('elderIntro').innerHTML = `
      <div class="elder-tagline" style="color:#888;letter-spacing:0.05em;font-size:10px;">Select at least one more advisor — ${elder.name} is waiting</div>
    `;
    document.getElementById('sendBtn').disabled = true;
  } else {
    document.getElementById('elderIntro').innerHTML = `
      <div class="elder-tagline" style="color:#888;letter-spacing:0.05em;font-size:10px;">Select 2 or more advisors, then ask your question.</div>
    `;
    document.getElementById('sendBtn').disabled = true;
  }

  // Init histories for new elders, seed with intro
  councilElders.forEach(eid => {
    if (!councilHistories[eid]) {
      const elder = ELDERS.find(e => e.id === eid);
      councilHistories[eid] = elder.intro ? [{ role: 'assistant', content: elder.intro }] : [];
    }
  });
}

function selectElder(id) {
  activeElder = ELDERS.find(e => e.id === id);
  history = [];
  document.querySelectorAll('.elder-btn').forEach(b => b.classList.remove('active', 'council-selected'));
  document.getElementById('btn-' + id).classList.add('active');
  document.getElementById('elderIntro').innerHTML = `
    <div class="elder-name">${activeElder.name}</div>
    <div class="elder-tagline">${activeElder.tagline}</div>
  `;
  const conv = document.getElementById('conversation');
  conv.innerHTML = '';
  if (activeElder.intro) {
    addMessage('elder', activeElder.intro, activeElder.name);
    history.push({ role: 'assistant', content: activeElder.intro });
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  if (isLoading) return;
  if (councilMode) {
    if (councilElders.length < 2) return;
    return sendCouncilMessage();
  }
  if (!activeElder) return;

  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  isLoading = true;
  input.value = '';
  input.style.height = '44px';
  document.getElementById('sendBtn').disabled = true;

  const conv = document.getElementById('conversation');
  const empty = conv.querySelector('.empty-state');
  if (empty) empty.remove();

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  const thinking = document.createElement('div');
  thinking.className = 'message thinking';
  thinking.id = 'thinking';
  thinking.textContent = activeElder.name + ' is thinking...';
  conv.appendChild(thinking);
  conv.scrollTop = conv.scrollHeight;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: activeElder.system + '\n\nContext about Abi:\n' + ABI_CONTEXT,
        messages: history
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'No response received.';
    document.getElementById('thinking')?.remove();
    history.push({ role: 'assistant', content: reply });
    addMessage('elder', reply, activeElder.name);

  } catch (err) {
    document.getElementById('thinking')?.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'error-msg';
    errDiv.textContent = 'Connection error. Check the API key.';
    conv.appendChild(errDiv);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

async function sendCouncilMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  isLoading = true;
  input.value = '';
  input.style.height = '44px';
  document.getElementById('sendBtn').disabled = true;

  const conv = document.getElementById('conversation');
  const empty = conv.querySelector('.empty-state');
  if (empty) empty.remove();

  addMessage('user', text);

  // Add thinking indicators for all council elders
  const thinkingIds = [];
  councilElders.forEach(eid => {
    const elder = ELDERS.find(e => e.id === eid);
    const thinking = document.createElement('div');
    thinking.className = 'message thinking';
    thinking.id = 'thinking-' + eid;
    thinking.textContent = elder.name + ' is thinking...';
    conv.appendChild(thinking);
    thinkingIds.push('thinking-' + eid);

    if (!councilHistories[eid]) councilHistories[eid] = [];
    councilHistories[eid].push({ role: 'user', content: text });
  });
  conv.scrollTop = conv.scrollHeight;

  // Mark where council responses start
  const responseAnchor = document.createElement('div');
  responseAnchor.id = 'council-response-anchor';
  conv.appendChild(responseAnchor);

  // Fire all requests in parallel, collect results in order
  let completedCount = 0;
  const totalCount = councilElders.length;

  const promises = councilElders.map(async (eid) => {
    const elder = ELDERS.find(e => e.id === eid);
    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: elder.system + '\n\nContext about Abi:\n' + ABI_CONTEXT,
          messages: councilHistories[eid]
        })
      });
      const data = await response.json();
      const reply = data.content?.[0]?.text || 'No response received.';

      document.getElementById('thinking-' + eid)?.remove();
      councilHistories[eid].push({ role: 'assistant', content: reply });

      // Add divider between responses (not before the first one)
      completedCount++;
      if (completedCount > 1) {
        const divider = document.createElement('div');
        divider.className = 'council-divider';
        conv.appendChild(divider);
      }

      addMessage('elder', reply, elder.name);
      conv.scrollTop = conv.scrollHeight;

    } catch (err) {
      document.getElementById('thinking-' + eid)?.remove();
      completedCount++;
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = elder.name + ': Connection error — ' + (err.message || 'check API key.');
      conv.appendChild(errDiv);
      conv.scrollTop = conv.scrollHeight;
    }
  });

  await Promise.all(promises);

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Process lines for lists and paragraphs
  const lines = html.split('\n');
  let result = '';
  let inList = false;
  let listType = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const ulMatch = line.match(/^[-•]\s+(.+)/);
    const olMatch = line.match(/^\d+\.\s+(.+)/);

    if (ulMatch) {
      if (!inList || listType !== 'ul') {
        if (inList) result += `</${listType}>`;
        result += '<ul>';
        inList = true;
        listType = 'ul';
      }
      result += `<li>${ulMatch[1]}</li>`;
    } else if (olMatch) {
      if (!inList || listType !== 'ol') {
        if (inList) result += `</${listType}>`;
        result += '<ol>';
        inList = true;
        listType = 'ol';
      }
      result += `<li>${olMatch[1]}</li>`;
    } else {
      if (inList) {
        result += `</${listType}>`;
        inList = false;
      }
      if (line.trim() === '') {
        result += '<br>';
      } else {
        result += line + '<br>';
      }
    }
  }
  if (inList) result += `</${listType}>`;

  return result;
}

function addMessage(type, text, speaker) {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = 'message ' + type;
  if (type === 'elder') {
    div.innerHTML = `<div class="speaker">${speaker}</div><div>${renderMarkdown(text)}</div>`;
  } else {
    div.textContent = text;
  }
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

// Speech Recognition
let recognition = null;
let isRecording = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('micBtn').style.display = 'none';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let finalTranscript = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += transcript + ' ';
      } else {
        interim = transcript;
      }
    }
    const input = document.getElementById('userInput');
    input.value = finalTranscript + interim;
    autoResize(input);
  };

  recognition.onend = () => {
    if (isRecording) {
      // Auto-restart if still in recording mode (browser sometimes stops)
      recognition.start();
    }
  };

  recognition.onerror = (event) => {
    if (event.error !== 'no-speech' && event.error !== 'aborted') {
      console.error('Speech error:', event.error);
      stopMic();
    }
  };
}

function toggleMic() {
  if (isRecording) {
    stopMic();
  } else {
    startMic();
  }
}

function startMic() {
  if (!recognition) return;
  const micBtn = document.getElementById('micBtn');
  isRecording = true;
  micBtn.classList.add('recording');
  document.getElementById('userInput').value = '';
  recognition.start();
}

function stopMic() {
  if (!recognition) return;
  const micBtn = document.getElementById('micBtn');
  isRecording = false;
  micBtn.classList.remove('recording');
  recognition.stop();
}

initSpeech();

// Enable mic button when an elder or council is selected
const origSelectElder = selectElder;
selectElder = function(id) {
  origSelectElder(id);
  if (recognition) document.getElementById('micBtn').disabled = false;
};

const origToggleCouncilElder = toggleCouncilElder;
toggleCouncilElder = function(id) {
  origToggleCouncilElder(id);
  if (recognition && councilElders.length >= 2) {
    document.getElementById('micBtn').disabled = false;
  } else if (recognition) {
    document.getElementById('micBtn').disabled = true;
  }
};

init();
</script>
